# ── Models ──────────────────────────────────────────────────────────────────────
# Select at runtime: python train.py --model-key deberta-base
models:
  deberta-base:
    name: "microsoft/deberta-v3-base"
    hub_model_id: "minko186/deberta-v3-base-fever-nli"
    max_length: 512

  deberta-large:
    name: "microsoft/deberta-v3-large"
    hub_model_id: "minko186/deberta-v3-large-fever-nli"
    max_length: 512

  deberta-mnli-fever:
    name: "MoritzLaurer/DeBERTa-v3-base-mnli-fever-anli"
    hub_model_id: "minko186/deberta-v3-mnli-fever-anli-finetuned"
    max_length: 512

  roberta-mnli:
    name: "roberta-large-mnli"
    hub_model_id: "minko186/roberta-large-mnli-fever-nli"
    max_length: 512

  cross-encoder-nli:
    name: "cross-encoder/nli-deberta-v3-base"
    hub_model_id: "minko186/cross-encoder-nli-deberta-fever"
    max_length: 512

default_model: "deberta-base"

# ── Labels ──────────────────────────────────────────────────────────────────────
labels:
  SUPPORTS: 0
  REFUTES: 1
  NOT ENOUGH INFO: 2
num_labels: 3

# ── Datasets ────────────────────────────────────────────────────────────────────
# Each entry is a HF Hub dataset with "claim", "evidence", and "label" columns.
# sample_size: 0 means use the full dataset.
datasets:
  - id: "minko186/fever-nli"
    sample_size: 0
  # - id: "minko186/vitaminc-nli"
  #   sample_size: 5000
  # - id: "minko186/anli-nli"
  #   sample_size: 5000

# ── Data Paths ──────────────────────────────────────────────────────────────────
# prepare.py saves tokenized data to processed_dir/run_name/
# Change run_name when switching model or dataset combo to keep artifacts separate.
data:
  processed_dir: "../../data/processed/fact_verification"
  run_name: "deberta-base-fever-nli"

# ── NEI Strategy ────────────────────────────────────────────────────────────────
# Controls how NOT ENOUGH INFO claims are handled during preprocessing.
# "empty": use empty string as evidence (standard FEVER baseline)
# "random": sample a random non-gold Wikipedia sentence as distractor
nei_strategy: "empty"

# ── Training ────────────────────────────────────────────────────────────────────
training_args:
  output_dir: "../../models/deberta-v3-base-fever-nli"
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  eval_strategy: "steps"
  eval_steps: 500
  save_strategy: "steps"
  save_steps: 500
  learning_rate: 2.0e-5
  weight_decay: 0.01
  num_train_epochs: 3
  warmup_ratio: 0.1
  save_total_limit: 2
  fp16: true
  bf16: false
  gradient_checkpointing: false
  push_to_hub: true
  load_best_model_at_end: true
  metric_for_best_model: "macro_f1"
  greater_is_better: true

# ── Inference ───────────────────────────────────────────────────────────────────
inference:
  retrieval_input: "../../data/processed/evidence_retrieval/results/fever-wiki-hybrid-v1.jsonl"
  output_dir: "../../data/processed/fact_verification/results"
  run_name: "fever-verdicts-v1"
  batch_size: 32
  evidence_join: " "    # how to join multiple evidence sentences into one string

# ── Evaluation ──────────────────────────────────────────────────────────────────
evaluation:
  metrics: ["accuracy", "f1_macro", "f1_per_class", "confusion_matrix"]
  eval_results_dir: "../../experiments/eval_results"
