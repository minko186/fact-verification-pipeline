# ── Model ──────────────────────────────────────────────────────────────────────
model:
  # Local snapshot avoids intermittent HF Hub brotli/httpx decode errors in some environments.
  name: "../../models/hf-flan-t5-base"
  type: "seq2seq"          # seq2seq (T5/FLAN-T5/BART) — extend for causal later
  hub_model_id: "minko186/flan-t5-base-fact-extraction-v2"

# ── Prompt ─────────────────────────────────────────────────────────────────────
prompt:
  template: "extract fact: {evidence} Based on this, what is the claim?"
  max_input_length: 512
  max_output_length: 128

# ── Datasets ───────────────────────────────────────────────────────────────────
# Each row: HF Hub "id" or local "path" (from preprocessors with --save-to-disk).
# sample_size: 0 means use the full merged split for that source.
datasets:
  - id: "minko186/fever-fact-extraction-supports"
    sample_size: 12000
  - path: "../../data/processed/fact_extraction/source_datasets/vitaminc"
    sample_size: 10000
  - path: "../../data/processed/fact_extraction/source_datasets/wice"
    sample_size: 15000
  - path: "../../data/processed/fact_extraction/source_datasets/scifact"
    sample_size: 0

# ── Data Paths ─────────────────────────────────────────────────────────────────
# prepare.py saves tokenized data to processed_dir/run_name/
# Change run_name when switching model or dataset combo to keep artifacts separate.
data:
  processed_dir: "../../data/processed/fact_extraction"
  run_name: "flan-t5-base-fever-vitaminc-wice-scifact"

# ── Training ───────────────────────────────────────────────────────────────────
training_args:
  output_dir: "../../models/flan-t5-base-fact-extraction-v2"
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 48
  predict_with_generate: true
  eval_strategy: "steps"
  eval_steps: 500
  save_strategy: "steps"
  save_steps: 500
  learning_rate: 0.0003
  num_train_epochs: 3
  max_steps: 800
  save_total_limit: 2
  fp16: false
  bf16: true
  gradient_checkpointing: false
  push_to_hub: true

# ── Inference ──────────────────────────────────────────────────────────────────
inference:
  num_beams: 4

# ── Evaluation ─────────────────────────────────────────────────────────────────
evaluation:
  metrics: ["rouge", "bertscore"]
  bertscore_model: "microsoft/deberta-xlarge-mnli"